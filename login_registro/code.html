<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#cf1791",
                        "background-light": "#f8f6f7",
                        "background-dark": "#21111c",
                        "neutral-light": "#e5dce2",
                        "text-main": "#181115",
                        "text-muted": "#88637c"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Acceso | Registro</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-text-main dark:text-slate-100 transition-colors duration-200">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<!-- Minimalist Card -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-neutral-light/50 dark:border-slate-800 p-8">
<!-- Logo/Header Area -->
<div class="flex flex-col items-center gap-4 mb-8">
<div class="size-10 text-primary">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z"></path>
</svg>
</div>
<h1 class="text-2xl font-bold tracking-tight text-text-main dark:text-white">Bienvenido de nuevo</h1>
<p class="text-text-muted dark:text-slate-400 text-sm">Ingresa tus credenciales para continuar</p>
</div>
<!-- Tabs -->
<div class="flex border-b border-neutral-light dark:border-slate-800 mb-8">
<button class="flex-1 flex flex-col items-center justify-center border-b-2 border-text-main dark:border-primary pb-3 transition-colors">
<span class="text-text-main dark:text-white text-sm font-semibold">Iniciar Sesión</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center border-b-2 border-transparent pb-3 hover:border-neutral-light transition-colors">
<span class="text-text-muted dark:text-slate-400 text-sm font-semibold">Registrarse</span>
</button>
</div>
<!-- Form -->
<form class="space-y-5" onsubmit="return false;">
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-slate-200 text-sm font-medium">Correo electrónico</label>
<input class="w-full h-12 px-4 rounded-lg border border-neutral-light dark:border-slate-700 bg-white dark:bg-slate-800 text-text-main dark:text-white placeholder:text-text-muted/60 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm" placeholder="ejemplo@correo.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="text-text-main dark:text-slate-200 text-sm font-medium">Contraseña</label>
<a class="text-xs text-primary font-medium hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative flex items-center">
<input class="w-full h-12 px-4 pr-12 rounded-lg border border-neutral-light dark:border-slate-700 bg-white dark:bg-slate-800 text-text-main dark:text-white placeholder:text-text-muted/60 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-text-muted hover:text-text-main dark:hover:text-white" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Primary Button -->
<button class="w-full h-12 bg-text-main dark:bg-primary text-white dark:text-white rounded-lg font-bold text-sm tracking-wide hover:opacity-90 transition-opacity mt-4">
                    Acceder
                </button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-neutral-light dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-text-muted text-xs uppercase tracking-widest font-medium">O</span>
<div class="flex-grow border-t border-neutral-light dark:border-slate-800"></div>
</div>
<!-- Secondary Button (Google) -->
<button class="w-full h-12 flex items-center justify-center gap-3 border border-neutral-light dark:border-slate-700 bg-white dark:bg-slate-800 text-text-main dark:text-white rounded-lg text-sm font-semibold hover:bg-background-light dark:hover:bg-slate-800/50 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continuar con Google
                </button>
</form>
<!-- Footer Link -->
<p class="mt-8 text-center text-xs text-text-muted dark:text-slate-500 leading-relaxed px-4">
                Al continuar, aceptas nuestros 
                <a class="underline hover:text-text-main dark:hover:text-white" href="#">Términos de Servicio</a> 
                y 
                <a class="underline hover:text-text-main dark:hover:text-white" href="#">Política de Privacidad</a>.
            </p>
</div>
<!-- Decorative background elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
</div>
</body></html>
